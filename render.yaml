services:
  - type: web
    name: fof-event-platform
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm install && pnpm exec prisma generate && pnpm exec prisma migrate deploy && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fof-postgres
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: fof-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: PLATFORM_ADMIN_EMAIL
        sync: false
      - key: PLATFORM_ADMIN_PASSWORD
        sync: false

databases:
  - name: fof-postgres
    plan: free
    databaseName: fof
    user: fof
